<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Placement Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto+Slab:wght@700&display=swap" rel="stylesheet">
    <script>
        async function getPrediction() {
            const data = {
                CGPA: parseFloat(document.getElementById("cgpa").value),
                Internships: parseInt(document.getElementById("internships").value),
                Projects: parseInt(document.getElementById("projects").value),
                "Workshops/Certifications": parseInt(document.getElementById("workshops").value),
                AptitudeTestScore: parseInt(document.getElementById("aptitude").value),
                SoftSkillsRating: parseFloat(document.getElementById("softskills").value),
                ExtracurricularActivities: parseInt(document.getElementById("extra").value),
                PlacementTraining: parseInt(document.getElementById("training").value),
                SSC_Marks: parseInt(document.getElementById("ssc").value),
                HSC_Marks: parseInt(document.getElementById("hsc").value)
            };

            const response = await fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            document.getElementById("output").innerText = "🎓 Prediction: " + result.PlacementStatus;
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>🌟 Student Placement Prediction 🌟</h2>
            <form onsubmit="event.preventDefault(); getPrediction();">
                <label>CGPA</label>
                <input type="text" id="cgpa" required>
                <label>Internships</label>
                <input type="number" id="internships" required>
                <label>Projects</label>
                <input type="number" id="projects" required>
                <label>Workshops/Certifications</label>
                <input type="number" id="workshops" required>
                <label>Aptitude Test Score</label>
                <input type="number" id="aptitude" required>
                <label>Soft Skills Rating</label>
                <input type="text" id="softskills" required>
                <label>Extracurricular Activities (0/1)</label>
                <input type="number" id="extra" required>
                <label>Placement Training (0/1)</label>
                <input type="number" id="training" required>
                <label>SSC Marks</label>
                <input type="number" id="ssc" required>
                <label>HSC Marks</label>
                <input type="number" id="hsc" required>
                <button type="submit">🚀 Predict Placement</button>
            </form>
            <div id="output"></div>
        </div>
    </div>
</body>
</html>
